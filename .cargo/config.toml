# 빌드 병렬/성능 설정
# 논리 코어 8개 중 7개 사용(1개는 시스템 여유). 의존성 그래프 병렬 + 크레이트 내 codegen 병렬에 적용.
[build]
jobs = 7

# 빠른 링커: mold. 거대한 Bevy 바이너리 링크 시간을 크게 단축.
#   - linker 는 시스템 기본 cc (gcc/clang 어느 쪽이든) 사용. -fuse-ld=mold 는 양쪽 모두 인식.
#   - 거의 모든 빌드의 병목인 링크 단계를 mold 로 대체.
#   - rustflags 변경은 전 크레이트 fingerprint 를 바꾸므로 최초 1회 풀 재컴파일 발생(이후 빌드부터 가속).
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# (nightly 한정) 단일 크레이트 프런트엔드 병렬: RUSTFLAGS="-Z threads=7" cargo +nightly ...
#   stable rustflags 에 넣으면 빌드가 깨지므로 전역 설정 금지(nightly 명령에서만).

# wasm32: mold/clang 비적용 + getrandom 0.3 의 wasm_js 백엔드 활성 cfg.
#   getrandom 0.3 은 wasm32-unknown-unknown 에서 명시적 cfg 없이는 컴파일 거부한다.
#   uuid v1 (bevy_reflect → uuid) 가 getrandom 0.3 을 끌어옴.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
